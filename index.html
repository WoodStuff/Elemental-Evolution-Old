<!DOCTYPE html>

<html lang="en">
	<!-- WARNING: Reading the source code might spoil game content! -->
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Elemental Evolution</title>

		<script src="js/utils.js"></script>

		<script src="js/classes/Timer.js"></script>

		<script src="js/main.js"></script>

		<link rel="stylesheet" href="css/main.css">
		<link rel="stylesheet" href="css/modifiers.css">
		<link rel="stylesheet" href="css/text.css">
		<link rel="stylesheet" href="css/button.css">
	</head>

	<body onload="start();">
		<div id="H" class="tab">
			<p id="H-label" class="big">You have <span id="H-value">0</span> hydrogen</p>
			<button id="H-button" class="xwide tall big">
				<p id="H-button-text">Gather</p>
				<p class="small">(<span id="H-button-min">?</span>–<span id="H-button-max">?</span>)</p>
				<div id="H-progress" class="progress"></div>
				<div></div>
			</button>

			<br>

			<div class="panel">
				<button id="H-efficiency" class="hidden">
					<p>Efficiency</p>
					<p class="small">Cost: <span id="H-efficiency-cost">?</span> H</p>
					<div id="H-efficiency-amount" class="amount">?</div>
				</button>

				<button id="H-cooldown" class="hidden">
					<p>Cooldown</p>
					<p class="small">Cost: <span id="H-cooldown-cost">?</span> H</p>
					<div id="H-cooldown-amount" class="amount right">?</div>
				</button>
			</div>

			<div class="icon"></div>
		</div>

		<div id="bottom">Elemental Evolution v0 • Current endgame: 1000 H</div>
	</body>
</html>
